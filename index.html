<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multimodal Analyser | Understand anything, instantly.</title>
    <meta name="description" content="Upload audio, image, or mixed media and get instant AI-powered analysis." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />

    <!-- React 18 + ReactDOM via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel Standalone for in-browser JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // ─── Constants ──────────────────────────────────────────────────────────────
        const TABS = [
            { id: "audio",      label: "Audio",      accept: ".mp3,.wav,.ogg,.m4a,.flac" },
            { id: "video",      label: "Image",      accept: ".jpg,.jpeg,.png,.webp,.bmp" },
            { id: "multimodal", label: "Multimodal", accept: ".jpg,.jpeg,.png,.webp,.bmp,.mp3,.wav,.ogg,.m4a" },
        ];

        const FEATURES = [
            { color: "#14B8A6", title: "Whisper-grade Transcription", desc: "State-of-art speech recognition across 40+ languages with 99%+ word accuracy." },
            { color: "#0F766E", title: "Frame-level Vision",          desc: "Scene segmentation, object detection, and action labelling on every keyframe." },
            { color: "#2DD4BF", title: "Cross-Modal Fusion",          desc: "Align speech, faces, and on-screen text into a unified, coherent narrative." },
            { color: "#14B8A6", title: "Emotion & Sentiment",         desc: "Detect valence, arousal and discrete emotions from voice and facial expressions." },
            { color: "#0F766E", title: "Speaker Diarisation",         desc: "Who said what and when — speaker tracking across the full audio timeline." },
            { color: "#2DD4BF", title: "Real-time Speed",             desc: "Optimised inference pipelines deliver results in under 3 seconds on typical files." },
        ];

        function fmt(bytes) {
            if (!bytes) return "";
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
            return (bytes / (1024 * 1024)).toFixed(1) + " MB";
        }

        function apiToPanelResult(payload, fileName, elapsedSec) {
            const label = String(payload?.label ?? payload?.verdict ?? "UNKNOWN");
            const score = Number(payload?.confidence ?? (payload?.risk_score != null ? payload.risk_score * 100 : 0));
            const raw = Number(payload?.raw_score ?? payload?.risk_score ?? 0);
            const processingSec = Number(payload?.processing_time_sec);
            const doneIn = Number.isFinite(processingSec)
                ? processingSec.toFixed(2) + "s"
                : elapsedSec.toFixed(2) + "s";
            const positive = label === "REAL" || label === "GENUINE";
            return {
                title: "Deepfake Detection Complete",
                time: doneIn,
                items: [
                    { label: "File", value: fileName, green: false },
                    { label: "Prediction", value: label, green: positive },
                    { label: "Confidence", value: `${score.toFixed(2)}%`, green: positive },
                    { label: "Raw Score", value: raw.toFixed(4), green: false },
                    { label: "Risk Tier", value: payload?.risk_tier || "-", green: false },
                    { label: "Explanation", value: payload?.explanation || payload?.message || "", green: false },
                ],
            };
        }

        // ─── SVG Icons ───────────────────────────────────────────────────────────────
        const MicIcon    = ({ size = 16 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>;
        const FilmIcon   = ({ size = 16 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>;
        const LayersIcon = ({ size = 16 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>;
        const ArrowRight = ({ size = 18 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>;

        const ICONS = { audio: MicIcon, video: FilmIcon, multimodal: LayersIcon };

        // ─── Navbar ──────────────────────────────────────────────────────────────────
        function Navbar() {
            return (
                <header className="navbar">
                    <nav className="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
                        <div className="flex items-center gap-2">
                            <div className="logo-icon">
                                <MicIcon size={16} />
                            </div>
                            <span style={{ fontWeight: 700, fontSize: "1.15rem", letterSpacing: "-0.02em" }}>Multimodal</span>
                        </div>

                        <div className="nav-links">
                            <a href="#analyser" className="nav-link">Analyser</a>
                            <a href="#features"  className="nav-link">Features</a>
                            <a href="#"          className="nav-link">Docs</a>
                        </div>

                        <a href="#analyser" className="btn-primary-sm">Try it free →</a>
                    </nav>
                </header>
            );
        }

        // ─── Hero ────────────────────────────────────────────────────────────────────
        function Hero() {
            return (
                <section className="hero-section px-6">
                    <div className="max-w-4xl mx-auto text-center">
                        <div className="badge">
                            <span className="badge-dot" />
                            Audio · Image · Multimodal
                        </div>

                        <h1 className="hero-title">
                            Stop watching.<br />
                            <span className="hero-highlight">
                                Start understanding.
                                <div className="hero-underline" />
                            </span>
                        </h1>

                        <p className="hero-sub">
                            Drop any media file — speech recordings, image files, or mixed content — and get instant
                            AI-powered analysis. Transcriptions, summaries, sentiment, speaker detection and more.
                        </p>

                        <div className="hero-ctas">
                            <a href="#analyser" className="btn-primary-lg">
                                Analyse now <ArrowRight />
                            </a>
                            <a href="#features" className="btn-secondary-lg">See features</a>
                        </div>
                    </div>

                    <div className="stat-row">
                        {[
                            ["99.2%", "Transcription accuracy"],
                            ["< 3s",  "Average processing time"],
                            ["40+",   "Supported languages"],
                            ["12",    "File formats"],
                        ].map(([num, label], i, arr) => (
                            <React.Fragment key={label}>
                                <div className="stat-card">
                                    <span className="stat-num">{num}</span>
                                    <span className="stat-label">{label}</span>
                                </div>
                                {i < arr.length - 1 && <div className="stat-divider" />}
                            </React.Fragment>
                        ))}
                    </div>
                </section>
            );
        }

        // ─── Dropzone ────────────────────────────────────────────────────────────────
        function Dropzone({ tabId, onFile, accept, title, subtitle }) {
            const inputRef = useRef();
            const colorMap = { audio: "blue", video: "purple", multimodal: "cyan" };
            const cls = colorMap[tabId] || "cyan";
            const Icon = ICONS[tabId] || ICONS.multimodal;
            const defaultLabels = {
                audio:      ["Drop audio file here",    "or click to browse · MP3, WAV, OGG, M4A, FLAC"],
                video:      ["Drop image file here",    "or click to browse · JPG, JPEG, PNG, WebP, BMP"],
                multimodal: ["Drop any media file",     "Image with audio, ZIP bundle, or any supported format"],
            };

            function handleDrop(e) {
                e.preventDefault();
                const f = e.dataTransfer.files[0];
                if (f) onFile(f);
            }

            const [mainLabel, secondaryLabel] = title ? [title, subtitle] : defaultLabels[tabId];

            return (
                <div
                    className={`dropzone dropzone-${cls}`}
                    onClick={() => inputRef.current.click()}
                    onDragOver={e => e.preventDefault()}
                    onDrop={handleDrop}
                    style={{ cursor: "pointer" }}
                >
                    <input
                        ref={inputRef}
                        type="file"
                        style={{ display: "none" }}
                        accept={accept || TABS.find(t => t.id === tabId)?.accept}
                        onChange={e => { if (e.target.files[0]) onFile(e.target.files[0]); }}
                    />
                    <div className={`dropzone-icon dropzone-icon-${cls}`}>
                        <Icon size={28} />
                    </div>
                    <p className="dropzone-title">{mainLabel}</p>
                    <p className="dropzone-sub">{secondaryLabel}</p>
                </div>
            );
        }

        // ─── File Chip ───────────────────────────────────────────────────────────────
        function FileChip({ tabId, file, onRemove }) {
            const colorMap = { audio: "blue", video: "video", multimodal: "multi" };
            const cls = colorMap[tabId];
            const Icon = ICONS[tabId];
            return (
                <div className={`file-chip file-chip-${cls}`}>
                    <div className={`file-chip-icon file-chip-icon-${cls}`}><Icon size={18} /></div>
                    <div className="file-chip-info">
                        <span className="file-chip-name">{file.name}</span>
                        <span className="file-chip-size">{fmt(file.size)}</span>
                    </div>
                    <button className="file-chip-remove" onClick={onRemove}>✕</button>
                </div>
            );
        }

        // ─── Loading Panel ───────────────────────────────────────────────────────────
        function LoadingPanel({ tabId }) {
            const logs = {
                audio:      ["> Preprocessing audio stream...", "> Running Whisper transcription...", "> Detecting speakers...", "> Scoring sentiment..."],
                video:      ["> Decoding image...", "> Running vision model...", "> Extracting features...", "> Detecting objects & artifacts..."],
                multimodal: ["> Extracting audio features...", "> Extracting visual features...", "> Running OCR on frames...", "> Cross-modal fusion model...", "> Generating unified report..."],
            };
            const spinnerClass = { audio: "", video: " spinner-video", multimodal: " spinner-multi" };
            const labels = { audio: "Analysing audio", video: "Processing image", multimodal: "Fusing modalities" };

            return (
                <div className="loading-panel">
                    <div className={`spinner${spinnerClass[tabId]}`} />
                    <p className="loading-text">{labels[tabId]}<span className="loading-dots" /></p>
                    <div className="loading-log">
                        {logs[tabId].map(l => <p key={l}>{l}</p>)}
                    </div>
                </div>
            );
        }

        // ─── Results Panel ───────────────────────────────────────────────────────────
        function ResultsPanel({ result, onReset, tabId }) {
            const resetCls = tabId === "multimodal" ? " reset-btn-multi" : "";
            return (
                <div>
                    <div className="results-header">
                        <span className="results-title">{result.title}</span>
                        <span className="results-time font-mono">Done in {result.time}</span>
                    </div>
                    {result.items.map(item => (
                        <div className="result-row" key={item.label}>
                            <span className="result-label">{item.label}</span>
                            <span className={`result-value${item.green ? " result-green" : ""}`}>{item.value}</span>
                        </div>
                    ))}
                    <button className={`reset-btn${resetCls}`} onClick={onReset}>↺ Analyse another file</button>
                </div>
            );
        }

        // ─── Panel Left Info ─────────────────────────────────────────────────────────
        const PANEL_INFO = {
            audio: {
                tagCls: "",
                tag: "Audio Analyser",
                title: <>Transcribe &amp;<br />Analyse Speech</>,
                desc: "Upload any audio file and get accurate transcription, speaker diarisation, sentiment analysis, and language detection.",
                features: ["Automatic transcription", "Speaker detection", "Sentiment & emotion", "40+ language support"],
            },
            video: {
                tagCls: "",
                tag: "Image Analyser",
                title: <>Scene &amp;<br />Visual Intelligence</>,
                desc: "Upload an image and extract visual descriptions, object detection, and artifact-level cues.",
                features: ["Scene understanding", "Object detection", "Action recognition", "Embedded transcription"],
            },
            multimodal: {
                tagCls: " panel-tag-multi",
                tag: "Multimodal Analyser",
                title: <>Fuse Every<br />Signal at Once</>,
                desc: "Combine audio, image, and on-screen text into a single coherent analysis. Cross-modal reasoning for richer insights.",
                features: ["Audio–visual alignment", "On-screen OCR", "Cross-modal summary", "Emotion & engagement"],
            },
        };

        function PanelLeft({ tabId }) {
            const { tagCls, tag, title, desc, features } = PANEL_INFO[tabId];
            const Icon = ICONS[tabId];
            const checkCls = tabId === "multimodal" ? " check-multi" : "";
            return (
                <div className="panel-left">
                    <div className="panel-info">
                        <div className={`panel-tag${tagCls}`}>
                            <Icon size={13} />{tag}
                        </div>
                        <h3 className="panel-title">{title}</h3>
                        <p className="panel-desc">{desc}</p>
                        <ul className="feature-list">
                            {features.map(f => (
                                <li key={f}><span className={`check${checkCls}`}>✓</span> {f}</li>
                            ))}
                        </ul>
                    </div>
                </div>
            );
        }

        // ─── Analyser Panel ──────────────────────────────────────────────────────────
        function AnalyserPanel({ tabId }) {
            const [file, setFile] = useState(null);
            const [imageFile, setImageFile] = useState(null);
            const [audioFile, setAudioFile] = useState(null);
            const [status, setStatus] = useState("idle");   // idle | loading | done | error
            const [result, setResult] = useState(null);
            const [error, setError] = useState("");

            function handleFile(f) {
                setStatus("idle");
                setResult(null);
                setError("");
                if (tabId === "multimodal") {
                    if (f.type.startsWith("audio/")) {
                        setAudioFile(f);
                    } else if (f.type.startsWith("image/")) {
                        setImageFile(f);
                    } else {
                        setError("Upload a supported image or audio file for multimodal analysis.");
                    }
                    return;
                }
                setFile(f);
            }

            async function analyse() {
                const isAudio = tabId === "audio";
                const isVideo = tabId === "video";
                const isMulti = tabId === "multimodal";
                const chosenFile = isMulti ? null : file;

                if (isMulti && !imageFile && !audioFile) {
                    setStatus("error");
                    setError("Upload an image or audio file to run multimodal analysis.");
                    return;
                }
                if (!isMulti && !chosenFile) {
                    return;
                }

                if (!isMulti) {
                    if (isAudio && !chosenFile.type.startsWith("audio/")) {
                        setStatus("error");
                        setError("This model currently supports audio files only.");
                        return;
                    }
                    if (isVideo && !chosenFile.type.startsWith("image/")) {
                        setStatus("error");
                        setError("This model currently supports image files only.");
                        return;
                    }
                }

                try {
                    if (!window.location.protocol.startsWith("http")) {
                        setStatus("error");
                        setError("Please open the app through its HTTP URL, e.g. http://127.0.0.1:8080/.");
                        return;
                    }

                    setStatus("loading");
                    setError("");
                    const startTime = performance.now();
                    const origin = window.location.origin;
                    const formData = new FormData();

                    let fileName = "multimodal-data";
                    let endpoint = "/predict-multimodal";

                    if (isMulti) {
                        if (imageFile) {
                            formData.append("image", imageFile);
                            fileName = imageFile.name;
                        }
                        if (audioFile) {
                            formData.append("audio", audioFile);
                            fileName = imageFile ? `${imageFile.name} + ${audioFile.name}` : audioFile.name;
                        }
                    } else {
                        formData.append(isAudio ? "audio" : "image", chosenFile);
                        endpoint = isAudio ? "/predict-audio" : "/predict";
                        fileName = chosenFile.name;
                    }

                    const res = await fetch(`${origin}${endpoint}`, {
                        method: "POST",
                        body: formData,
                    });

                    const payload = await res.json();
                    if (!res.ok) {
                        throw new Error(payload?.error || "Model inference failed.");
                    }

                    setStatus("done");
                    const elapsedSec = (performance.now() - startTime) / 1000;
                    setResult(apiToPanelResult(payload, fileName, elapsedSec));
                } catch (e) {
                    setStatus("error");
                    const msg = e?.message || "Unexpected error while running model inference.";
                    if (msg.includes("Failed to fetch") || msg.includes("NetworkError")) {
                        setError("Cannot connect to server. Make sure app.py is running.");
                    } else {
                        setError(msg);
                    }
                }
            }

            function reset() {
                setFile(null);
                setImageFile(null);
                setAudioFile(null);
                setStatus("idle");
                setResult(null);
                setError("");
            }

            const btnCls = {
                audio:      "analyse-btn",
                video:      "analyse-btn analyse-btn-video",
                multimodal: "analyse-btn analyse-btn-multi",
            }[tabId];

            const btnLabel = { audio: "Analyse Audio", video: "Analyse Image", multimodal: "Run Multimodal Analysis" }[tabId];
            const hasMultiFiles = !!imageFile || !!audioFile;

            return (
                <div className="panel-card">
                    <PanelLeft tabId={tabId} />
                    <div className="panel-right">
                        {tabId === "multimodal" ? (
                            <>
                                <div className="multimodal-grid">
                                    <Dropzone
                                        tabId="video"
                                        accept=".jpg,.jpeg,.png,.webp,.bmp"
                                        onFile={handleFile}
                                        title="Drop image here"
                                        subtitle="Supports JPG, PNG, BMP, WebP"
                                    />
                                    <Dropzone
                                        tabId="audio"
                                        accept=".mp3,.wav,.ogg,.m4a,.flac"
                                        onFile={handleFile}
                                        title="Drop audio here"
                                        subtitle="Supports WAV, MP3, OGG, M4A"
                                    />
                                </div>

                                {status === "idle" && hasMultiFiles && (
                                    <div className="multimodal-preview">
                                        {imageFile && <FileChip tabId="multimodal" file={imageFile} onRemove={() => { setImageFile(null); setStatus("idle"); }} />}
                                        {audioFile && <FileChip tabId="multimodal" file={audioFile} onRemove={() => { setAudioFile(null); setStatus("idle"); }} />}
                                    </div>
                                )}

                                <button className={btnCls} onClick={analyse} disabled={!hasMultiFiles}>
                                    {btnLabel} <ArrowRight size={16} />
                                </button>
                            </>
                        ) : (
                            <>
                                {/* Idle — no file */}
                                {status === "idle" && !file && (
                                    <Dropzone tabId={tabId} onFile={handleFile} />
                                )}

                                {/* Idle — file chosen */}
                                {status === "idle" && file && (
                                    <>
                                        <FileChip tabId={tabId} file={file} onRemove={reset} />
                                        <button className={btnCls} onClick={analyse}>
                                            {btnLabel} <ArrowRight size={16} />
                                        </button>
                                    </>
                                )}
                            </>
                        )}

                        {/* Loading */}
                        {status === "loading" && <LoadingPanel tabId={tabId} />}

                        {/* Done */}
                        {status === "done" && result && (
                            <ResultsPanel result={result} onReset={reset} tabId={tabId} />
                        )}

                        {/* Error */}
                        {status === "error" && (
                            <div className="result-row" style={{ borderBottom: "none" }}>
                                <span className="result-label">Error</span>
                                <span className="result-value" style={{ color: "#ef4444" }}>{error}</span>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ─── Analyser Section ────────────────────────────────────────────────────────
        function AnalyserSection() {
            const [activeTab, setActiveTab] = useState("audio");

            return (
                <section id="analyser" className="analyser-section px-6">
                    <div className="max-w-5xl mx-auto">
                        <div className="section-header">
                            <h2 className="section-title">Pick your modality</h2>
                            <p className="section-sub">Upload a file and get instant AI analysis — no sign-up required.</p>
                        </div>

                        {/* Tab Bar */}
                        <div className="tab-bar" role="tablist">
                            {TABS.map(tab => {
                                const Icon = ICONS[tab.id];
                                return (
                                    <button
                                        key={tab.id}
                                        role="tab"
                                        className={`tab-btn${activeTab === tab.id ? " tab-btn-active" : ""}`}
                                        onClick={() => setActiveTab(tab.id)}
                                    >
                                        <Icon size={16} />
                                        {tab.label}
                                    </button>
                                );
                            })}
                        </div>

                        {/* Only mount the active panel — no x-show / DOM sprawl */}
                        <AnalyserPanel key={activeTab} tabId={activeTab} />
                    </div>
                </section>
            );
        }

        // ─── Features Section ────────────────────────────────────────────────────────
        function FeaturesSection() {
            const colorBg = { "#14B8A6": "rgba(20,184,166,.12)", "#0F766E": "rgba(15,118,110,.12)", "#2DD4BF": "rgba(45,212,191,.12)" };
            return (
                <section id="features" className="features-section px-6">
                    <div className="max-w-5xl mx-auto">
                        <div className="section-header">
                            <h2 className="section-title">Built for precision</h2>
                            <p className="section-sub">Every pipeline is battle-tested on real-world media.</p>
                        </div>
                        <div className="features-grid">
                            {FEATURES.map(f => (
                                <div className="feature-card" key={f.title}>
                                    <div className="feature-icon" style={{ background: colorBg[f.color] }}>
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={f.color} strokeWidth="2" strokeLinecap="round">
                                            <circle cx="12" cy="12" r="4" /><circle cx="12" cy="12" r="9" />
                                        </svg>
                                    </div>
                                    <h4 className="feature-card-title">{f.title}</h4>
                                    <p className="feature-card-desc">{f.desc}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        }

        // ─── Footer Ticker ───────────────────────────────────────────────────────────
        const TICKER_ITEMS = [
            "MP3 · WAV · OGG · M4A · FLAC", "JPG · JPEG · PNG · WebP · BMP",
            "Speaker Diarisation", "Emotion Detection", "Scene Understanding",
            "Cross-Modal Fusion", "Whisper ASR", "Sentiment Analysis", "OCR on Frames", "40+ Languages",
        ];

        function Ticker() {
            return (
                <footer className="ticker-footer">
                    <div className="ticker-track">
                        {[0, 1].map(i => (
                            <div className="ticker-group" key={i} aria-hidden={i === 1}>
                                {TICKER_ITEMS.map(item => <span key={item}>{item}</span>)}
                            </div>
                        ))}
                    </div>
                </footer>
            );
        }

        // ─── App ─────────────────────────────────────────────────────────────────────
        function App() {
            return (
                <>
                    {/* Ambient background */}
                    <div className="fixed inset-0 pointer-events-none" style={{ zIndex: -2, backgroundImage: "linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px)", backgroundSize: "52px 52px", maskImage: "radial-gradient(ellipse at 50% 20%, black 20%, transparent 75%)" }} />
                    <div className="fixed inset-0 pointer-events-none" style={{ zIndex: -1, background: "radial-gradient(circle at 70% 30%, rgba(20,184,166,0.07) 0%, transparent 55%), radial-gradient(circle at 20% 80%, rgba(15,118,110,0.05) 0%, transparent 50%)" }} />

                    <Navbar />
                    <main style={{ paddingBottom: "48px" }}>
                        <Hero />
